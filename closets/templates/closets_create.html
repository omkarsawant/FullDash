{% extends 'base.html' %}
{% block content %}
<form method="POST">{% csrf_token %}
    {{ formset.management_form }}
    {% for form in formset %}
    <h4>{{ form.floor.label }}: {{ form.floor }} {{ form.category.label }}: {{ form.category }} {{ form.DELETE }} Delete
        Record</h4>
    {{ form.id }}
    {% endfor %}
    <input type="submit" value="Save">
</form>
{% endblock content %}
