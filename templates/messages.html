{% if messages %}
{% for message in messages %}
<div class='row w-100'>
    <div class='col'>
        <div class='alert {{ message.tags }} alert-dismissable'>
            {{ message|striptags }}
            <button type='button' class='close' data-dismiss='alert'>
                <span aria-hidden='true'>&times;</span>
            </button>
        </div>
    </div>
</div>
{% endfor %}
{% endif %}
