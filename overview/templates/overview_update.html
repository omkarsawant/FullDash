{% extends 'base.html' %}
{% block content %}
<form method='POST'>{% csrf_token %}
    {% for overview_field in obj.form %}
    <h4>{{ overview_field.label }}: {{ overview_field }}</h4>
    {% endfor %}
    <input type='submit' value='{{ obj.submit_text }}'>
</form>
{% if obj.popup == 'True' %}
<script>
    window.alert('The devices chosen are not conforming to standards');
</script>
{% endif %}
{% endblock content %}
